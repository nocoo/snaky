included:
  - Sources
  - Tests

disabled_rules:
  - trailing_comma

opt_in_rules:
  - closure_spacing
  - empty_count
  - explicit_init
  - force_unwrapping
  - implicitly_unwrapped_optional
  - multiline_arguments
  - operator_usage_whitespace
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_imports
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

line_length:
  warning: 120
  error: 150

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 50
  error: 80

identifier_name:
  min_length: 2
  max_length: 60
  excluded:
    - id
    - ip
    - ok
