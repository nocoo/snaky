# Extend gitleaks default rules, then allowlist known test/doc placeholders.
[extend]
useDefault = true

[allowlist]
description = "Fake DNS tokens used in tests and docs (not real secrets)"
regexes = [
  '''a1b2c3d4e5f6''',
  '''f7e8d9c0b1a2''',
  '''abcdef123456''',
]
paths = [
  '''packages/cli/src/dns-leak/output\.test\.ts''',
  '''apps/macos/Tests/SnakyCoreTests/DnsLeakTests\.swift''',
  '''docs/features/02-dns-leak-detection\.md''',
]
