name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

      - name: Diagnose CLI binary
        run: |
          echo "=== node ==="; node --version
          echo "=== pnpm ==="; pnpm --version
          echo "=== root node_modules/undici ==="; ls -la node_modules/undici 2>&1 | head -3 || echo "MISSING"
          echo "=== cli node_modules/undici ==="; ls -la packages/cli/node_modules/undici 2>&1 | head -3 || echo "MISSING"
          echo "=== resolve undici from dist ==="; node --input-type=module -e "import('undici').then(m=>console.log('OK', typeof m.ProxyAgent)).catch(e=>{console.log('FAIL',e.code,e.message); process.exit(1)})" || true
          echo "=== CLI --version ==="; node packages/cli/dist/index.js --version 2>&1 || echo "EXIT=$?"
          echo "=== CLI --help (first 5 lines) ==="; node packages/cli/dist/index.js --help 2>&1 | head -5 || echo "EXIT=$?"

      - run: pnpm test:e2e
